name: Auto Sync Upstream + Auto Tag + Auto Build GHCR
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  auto-sync-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync with official WechatOnCloud
        uses: aormsby/Fork-Sync-With-Upstream-action@v3
        with:
          upstream_repository: Gloridust/WechatOnCloud
          target_repository: ${{ github.repository }}
          target_branch: main
          upstream_branch: main
          sync_tags: true

      - name: Auto create tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          NEW_VER=$(git tag -l "v*.*.*" | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n 1)

          if [ -z "$NEW_VER" ]; then
            echo "❌ 未检测到有效版本号，退出"
            exit 1
          fi

          echo "🔍 检测到官方最新版本: $NEW_VER"

          if git rev-parse "$NEW_VER" >/dev/null 2>&1; then
            echo "✅ 版本 $NEW_VER 已存在，无需重复发布"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$NEW_VER"
          git push origin "$NEW_VER"

          gh release create "$NEW_VER" \
            --title "$NEW_VER" \
            --generate-notes \
            --latest

          echo "🚀 发布完成！自动构建GHCR镜像..."
