name: Auto Sync Upstream + Auto Tag + Auto Build GHCR
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write
  workflows: write  # 新增：允许修改workflow配置文件，解决推送被拒

jobs:
  auto-sync-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync official source code
        uses: repo-sync/github-sync@v2
        with:
          source_repo: Gloridust/WechatOnCloud
          source_branch: main
          destination_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sync_tags: true

      - name: Auto create tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git fetch --tags
          NEW_VER=$(git tag -l "v*.*.*" | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n 1)

          if [ -z "$NEW_VER" ]; then
            echo "❌ 未检测到有效版本号，退出"
            exit 1
          fi
          echo "🔍 检测到官方最新版本: $NEW_VER"

          if git rev-parse "$NEW_VER" >/dev/null 2>&1; then
            echo "✅ 版本 $NEW_VER 已存在，无需重复发布"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_VER"
          git push origin "$NEW_VER"

          gh release create "$NEW_VER" --title "$NEW_VER" --generate-notes --latest
          echo "🚀 发布成功，触发镜像构建"
