name: Auto Sync Upstream + Auto Tag + Auto Build GHCR
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  auto-sync-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # 稳定同步工具，@v2永久有效，无版本报错
      - name: Sync official source code & tags
        uses: repo-sync/github-sync@v2
        with:
          source_repo: Gloridust/WechatOnCloud
          source_branch: main
          destination_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 自动筛选最新语义化版本、打Tag、发布Release
      - name: Auto create tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          NEW_VER=$(git tag -l "v*.*.*" | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n 1)

          if [ -z "$NEW_VER" ]; then
            echo "❌ 未检测到有效版本号，退出"
            exit 1
          fi

          echo "🔍 检测到官方最新版本: $NEW_VER"

          # 标签已存在就跳过发布
          if git rev-parse "$NEW_VER" >/dev/null 2>&1; then
            echo "✅ 版本 $NEW_VER 已存在，无需重复发布"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$NEW_VER"
          git push origin "$NEW_VER"

          gh release create "$NEW_VER" \
            --title "$NEW_VER" \
            --generate-notes \
            --latest

          echo "🚀 Release创建完毕，自动触发release.yml构建GHCR镜像"
