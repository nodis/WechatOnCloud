name: Auto Sync Upstream + Auto Tag + Auto Build GHCR
on:
  schedule:
    - cron: '0 19 * * *'  # 每天19点自动运行
  workflow_dispatch:       # 手动触发选项

permissions:
  contents: write         # 允许写仓库内容（打标签、发Release）
  packages: write         # 允许写GHCR镜像

jobs:
  auto-sync-release:
    runs-on: ubuntu-latest
    env:
      # 关键修复：强制使用Node.js 24运行所有JavaScript Actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout code (Node24兼容版)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # 拉取所有历史记录，包括标签
          persist-credentials: true  # 保留凭证用于后续推送

      # 稳定同步工具，@v2永久有效，无版本报错
      - name: Sync official source code & tags
        uses: repo-sync/github-sync@v2
        with:
          source_repo: Gloridust/WechatOnCloud  # 官方仓库
          source_branch: main                   # 官方主分支
          destination_branch: main              # 你的主分支
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 自动获取的密钥

      # 自动筛选最新语义化版本、打Tag、发布Release
      - name: Auto create tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 拉取所有标签
          git fetch --tags
          
          # 筛选vX.Y.Z格式的版本号，排序后取最新
          NEW_VER=$(git tag -l "v*.*.*" | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n 1)

          if [ -z "$NEW_VER" ]; then
            echo "❌ 未检测到有效版本号，退出"
            exit 1
          fi

          echo "🔍 检测到官方最新版本: $NEW_VER"

          # 检查标签是否已存在，避免重复发布
          if git rev-parse "$NEW_VER" >/dev/null 2>&1; then
            echo "✅ 版本 $NEW_VER 已存在，无需重复发布"
            exit 0
          fi

          # 配置提交用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 打标签并推送到远程
          git tag "$NEW_VER"
          git push origin "$NEW_VER"

          # 创建GitHub Release（自动生成发布说明）
          gh release create "$NEW_VER" \
            --title "$NEW_VER" \
            --generate-notes \
            --latest

          echo "🚀 Release创建完毕，自动触发release.yml构建GHCR镜像"
